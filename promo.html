<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>שלמות AI — סרטון פרומו</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Heebo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Assistant', 'Heebo', sans-serif; }
  #audio-btn {
    position: fixed; top: 14px; right: 14px; z-index: 9999;
    background: rgba(20,20,20,0.9); color: #f6f4ef;
    border: 1px solid rgba(212,168,67,0.5); border-radius: 999px;
    padding: 10px 20px; font-family: 'Assistant', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    direction: rtl; backdrop-filter: blur(10px);
  }
  #audio-btn:hover { background: rgba(40,40,40,0.95); }
  #rec-btn {
    position: fixed; top: 14px; right: 180px; z-index: 9999;
    background: linear-gradient(135deg, #d4a843, #e8c460); color: #000;
    border: none; border-radius: 999px;
    padding: 10px 22px; font-family: 'Assistant', sans-serif; font-size: 13px; font-weight: 800;
    cursor: pointer; direction: rtl; box-shadow: 0 6px 24px rgba(212,168,67,0.5);
    display: flex; align-items: center; gap: 8px;
  }
  #rec-btn:hover { filter: brightness(1.08); }
  #rec-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  #rec-status {
    position: fixed; top: 60px; right: 14px; z-index: 9999;
    background: rgba(0,0,0,0.85); color: #fff; font-size: 13px; font-weight: 700;
    padding: 10px 18px; border-radius: 10px; direction: rtl;
    font-family: 'Assistant', sans-serif; display: none;
    border: 1px solid rgba(212,168,67,0.5); max-width: 380px; line-height: 1.5;
  }
  #rec-status.show { display: block; }
  .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff3b30; display: inline-block; animation: rp 1s infinite; margin-left: 6px; }
  @keyframes rp { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <rect width="400" height="400" fill="#0a0a0a"/>
    <circle cx="200" cy="200" r="100" fill="url(#g)" opacity="0.8"/>
    <polygon points="175,160 175,240 245,200" fill="#000"/>
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#d4a843"/>
        <stop offset="1" stop-color="#e8c460"/>
      </linearGradient>
    </defs>
  </svg>
</template>
<div id="root"></div>
<button id="rec-btn" onclick="recordVideo()">⬇ הורד את הסרטון (MP4)</button>
<div id="rec-status"></div>
<button id="audio-btn" onclick="toggleAudio()">🔊 הפעל מוזיקה</button>
<audio id="bg-audio" loop preload="auto" crossorigin="anonymous"
  src="bg-music.mp3"></audio>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="Scenes.jsx"></script>

<script type="text/babel">
  const audio = document.getElementById('bg-audio');
  const btn = document.getElementById('audio-btn');
  let audioStarted = false;

  function toggleAudio() {
    if (!audioStarted) {
      // Start audio at 25% like the site
      const kick = () => {
        try {
          if (audio.duration && isFinite(audio.duration)) {
            audio.currentTime = audio.duration * 0.25;
          }
        } catch (e) {}
        audio.volume = 0.7;
        audio.play().then(() => {
          audioStarted = true;
          btn.innerHTML = '🔇 השתק';
        }).catch(() => {});
      };
      if (audio.readyState >= 1) kick();
      else audio.addEventListener('loadedmetadata', kick, { once: true });
    } else {
      if (audio.paused) {
        audio.play();
        btn.innerHTML = '🔇 השתק';
      } else {
        audio.pause();
        btn.innerHTML = '🔊 הפעל מוזיקה';
      }
    }
  }

  // Try autoplay on first user interaction
  window.addEventListener('pointerdown', () => {
    if (!audioStarted) toggleAudio();
  }, { once: true });

  // ═══════════════════════════════════════════════════════
  // RECORD & DOWNLOAD — uses getDisplayMedia (tab capture)
  // ═══════════════════════════════════════════════════════
  const recBtn = document.getElementById('rec-btn');
  const recStatus = document.getElementById('rec-status');

  function showStatus(html) {
    recStatus.innerHTML = html;
    recStatus.classList.add('show');
  }

  async function recordVideo() {
    recBtn.disabled = true;

    // Step 1: Instructions popup
    showStatus(`
      <b style="color:#d4a843;font-size:15px;">📋 הוראות הקלטה:</b><br><br>
      1. יפתח חלון של Chrome<br>
      2. בחר לשונית <b>"Chrome Tab"</b><br>
      3. סמן את הטאב הנוכחי<br>
      4. ✅ <b style="color:#ff6b6b;">סמן "Share tab audio"</b><br>
      5. לחץ <b>Share</b><br><br>
      <span style="color:#aaa;font-size:11px;">ההקלטה תתחיל אוטומטית</span>
    `);

    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { width: 1920, height: 1080, frameRate: 60 },
        audio: true,
        preferCurrentTab: true,
      });

      // Check if audio track present
      const hasAudio = stream.getAudioTracks().length > 0;

      showStatus(`<span class="rec-dot"></span> <b>מכין...</b>`);

      // Reload the animation timeline
      try {
        localStorage.setItem('shlemut-promo', '0');
        window.dispatchEvent(new Event('storage'));
      } catch(e) {}

      // Wait a beat then start audio + recording together
      await new Promise(r => setTimeout(r, 800));

      // Start audio if not started
      if (!audioStarted) {
        const a = audio;
        try {
          if (a.duration && isFinite(a.duration)) a.currentTime = a.duration * 0.25;
          a.volume = 0.85;
          await a.play();
          audioStarted = true;
          btn.innerHTML = '🔇 השתק';
        } catch(e) {}
      } else {
        try { audio.currentTime = audio.duration * 0.25; audio.volume = 0.85; } catch(e) {}
      }

      // Try to reset stage time to 0 by clearing localStorage
      try {
        localStorage.removeItem('shlemut-promo');
        // Find the stage's scrubber slider if present
        const slider = document.querySelector('input[type="range"]');
        if (slider) {
          const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
          setter.call(slider, '0');
          slider.dispatchEvent(new Event('input', { bubbles: true }));
        }
      } catch(e) {}

      // Pick best mime
      let mime = 'video/webm;codecs=vp9,opus';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8,opus';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

      const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
      const chunks = [];
      recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'shlemut-ai-promo.webm';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 8000);
        stream.getTracks().forEach(t => t.stop());

        showStatus(`
          <b style="color:#4ade80;">✓ הקובץ הורד!</b><br>
          <span style="font-size:12px;color:#aaa;">נשמר בתיקיית Downloads בשם:<br><b>shlemut-ai-promo.webm</b></span><br><br>
          <b style="color:#d4a843;font-size:13px;">להמרה ל-MP4:</b><br>
          <span style="font-size:11px;">פתחו <a href="https://cloudconvert.com/webm-to-mp4" target="_blank" style="color:#d4a843;text-decoration:underline;">cloudconvert.com</a><br>
          → העלו את הקובץ<br>
          → Convert → Download MP4</span>
        `);
        recBtn.disabled = false;
        recBtn.innerHTML = '⬇ הקלט שוב';
      };

      recorder.start();
      const startTime = Date.now();

      const tick = () => {
        const elapsed = (Date.now() - startTime) / 1000;
        const remaining = Math.max(0, 60 - elapsed);
        if (remaining > 0) {
          showStatus(`
            <span class="rec-dot"></span> <b>מקליט...</b><br>
            <span style="font-size:26px;color:#d4a843;font-weight:900;">${remaining.toFixed(1)}s</span>
            <span style="font-size:11px;color:#aaa;">נותרו</span>
            ${!hasAudio ? '<br><span style="color:#ff6b6b;font-size:11px;">⚠ לא סימנת "Share tab audio" — אין מוזיקה</span>' : ''}
          `);
          requestAnimationFrame(tick);
        }
      };
      tick();

      setTimeout(() => {
        if (recorder.state === 'recording') recorder.stop();
      }, 60_200);

    } catch (err) {
      console.error(err);
      showStatus(`
        <b style="color:#ff6b6b;">⚠ ההקלטה נכשלה</b><br>
        <span style="font-size:12px;">${err.message || 'Permission denied'}</span><br><br>
        <span style="font-size:11px;color:#aaa;">פתרונות:<br>
        • בדוק שאתה ב-Chrome (לא באמבדד)<br>
        • לחץ שוב ותן הרשאה<br>
        • חלופה: Win+G להקלטה עם Xbox Game Bar</span>
      `);
      recBtn.disabled = false;
    }
  }
  window.recordVideo = recordVideo;

  const App = () => (
    <Stage width={1920} height={1080} duration={60} background="#0a0a0a" persistKey="shlemut-promo">
      <Composition />
    </Stage>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
