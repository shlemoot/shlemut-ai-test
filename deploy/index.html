<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Studio Shlemut AI — UI Kit</title>
<link rel="icon" type="image/gif" href="assets/images/logo-nav.gif">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Assistant','Heebo','Segoe UI',Arial,sans-serif;line-height:1.75;overflow-x:hidden;-webkit-font-smoothing:antialiased;position:relative;}

  /* ── Animated page background ────────────────────────── */
  .site-bg{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;background:
    radial-gradient(ellipse at 20% 0%,rgba(25,20,40,.9),transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(40,20,25,.85),transparent 60%),
    #000;}
  /* slow RGB aurora fog */
  .site-bg::before{content:"";position:absolute;inset:-25%;
    background:
      radial-gradient(circle at 18% 30%,rgba(255,0,128,.18),transparent 40%),
      radial-gradient(circle at 78% 22%,rgba(0,112,243,.16),transparent 42%),
      radial-gradient(circle at 40% 85%,rgba(0,223,216,.14),transparent 42%),
      radial-gradient(circle at 85% 75%,rgba(121,40,202,.17),transparent 42%),
      radial-gradient(circle at 60% 50%,rgba(212,168,67,.10),transparent 50%);
    filter:blur(40px);
    animation:auroraDrift 28s ease-in-out infinite alternate;}
  @keyframes auroraDrift{
    0%  {transform:translate(0,0) scale(1);}
    33% {transform:translate(4%,-3%) scale(1.08);}
    66% {transform:translate(-3%,4%) scale(.96);}
    100%{transform:translate(2%,-2%) scale(1.05);}
  }
  /* drifting conic gold ring */
  .site-bg::after{content:"";position:absolute;top:-20%;left:-20%;width:140%;height:140%;
    background:conic-gradient(from 0deg,transparent 0deg,rgba(212,168,67,.08) 30deg,transparent 80deg,
      transparent 180deg,rgba(255,255,255,.04) 210deg,transparent 260deg,transparent 360deg);
    filter:blur(60px);opacity:.6;
    animation:conicSpin 45s linear infinite;}
  @keyframes conicSpin{to{transform:rotate(360deg);}}

  /* twinkling stars layer */
  .site-stars{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.55;
    background-image:
      radial-gradient(1px 1px at 12% 18%,#fff,transparent 50%),
      radial-gradient(1px 1px at 38% 42%,#d4a843,transparent 50%),
      radial-gradient(1.5px 1.5px at 66% 14%,#fff,transparent 55%),
      radial-gradient(1px 1px at 82% 64%,#a78bfa,transparent 50%),
      radial-gradient(1px 1px at 22% 78%,#fff,transparent 50%),
      radial-gradient(1.5px 1.5px at 54% 88%,#00dfd8,transparent 55%),
      radial-gradient(1px 1px at 90% 30%,#fff,transparent 50%),
      radial-gradient(1px 1px at 8% 54%,#ff4d8a,transparent 50%);
    background-size:100% 100%;
    animation:twinkle 6s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.35;}50%{opacity:.75;}}
  /* second star layer — slower parallax */
  .site-stars::after{content:"";position:absolute;inset:0;
    background-image:
      radial-gradient(1px 1px at 28% 10%,#fff,transparent 50%),
      radial-gradient(1px 1px at 48% 32%,#fff,transparent 50%),
      radial-gradient(1px 1px at 72% 52%,#d4a843,transparent 50%),
      radial-gradient(1px 1px at 18% 68%,#fff,transparent 50%),
      radial-gradient(1px 1px at 94% 88%,#fff,transparent 50%);
    opacity:.6;animation:twinkle 9s ease-in-out infinite -3s;}

  /* subtle grain texture */
  .site-grain{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.8'/></svg>");}
  a{color:var(--gold);text-decoration:none;transition:color .3s;}
  a:hover{color:var(--gold-light);}
  ::selection{background:rgba(212,168,67,.3);color:#fff;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
  @keyframes mockupFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes rgbText{0%{background-position:0% 50%}100%{background-position:300% 50%}}
  @keyframes rgbHighlight{0%{background-position:0% 0%,0% 50%}100%{background-position:0% 0%,300% 50%}}
  @keyframes logoPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 12px rgba(212,168,67,.3));}50%{transform:scale(1.04);filter:drop-shadow(0 0 24px rgba(212,168,67,.5));}}
  @keyframes fogDrift{0%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.15);}66%{transform:translate(-30px,40px) scale(.9);}100%{transform:translate(20px,-20px) scale(1.05);}}
  /* section tag */
  @keyframes tagBorderRun{to{background-position:300% 0;}}
  @keyframes tagFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  @keyframes tagPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,.5);transform:scale(1);}50%{box-shadow:0 0 0 6px rgba(0,0,0,0);transform:scale(1.2);}}
  /* stats */
  @keyframes statFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  @keyframes orbPulse{0%,100%{opacity:.35;transform:translateX(-50%) scale(1);}50%{opacity:.7;transform:translateX(-50%) scale(1.25);}}
  @keyframes ping{0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,.6);transform:scale(1);}50%{box-shadow:0 0 0 10px rgba(212,168,67,0);transform:scale(1.25);}}
  @keyframes flashIn{from{opacity:0;transform:translateY(8px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
  /* features */
  @keyframes featureFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  @keyframes orbit{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(-30px,20px) scale(1.2);}66%{transform:translate(20px,-10px) scale(.9);}}
  @keyframes iconWiggle{0%,100%{transform:rotate(-4deg) scale(1);}25%{transform:rotate(6deg) scale(1.1);}50%{transform:rotate(-2deg) scale(1.05);}75%{transform:rotate(4deg) scale(1.08);}}
  @keyframes gradShift{0%{background-position:0 0,0 50%;}100%{background-position:0 0,300% 50%;}}
  /* site bg */
  @keyframes auroraDrift{0%{transform:translate(0,0) scale(1);}33%{transform:translate(4%,-3%) scale(1.08);}66%{transform:translate(-3%,4%) scale(.96);}100%{transform:translate(2%,-2%) scale(1.05);}}
  @keyframes conicSpin{to{transform:rotate(360deg);}}
  @keyframes twinkle{0%,100%{opacity:.35;}50%{opacity:.75;}}
  /* RGB cursor halo */
  html,body,a,button,input,textarea,select,.hoverable{cursor:none !important;}
  .cursor-dot{position:fixed;top:0;left:0;z-index:10001;pointer-events:none;
    width:8px;height:8px;border-radius:50%;
    background:var(--cursor-color,#ff0000);
    box-shadow:0 0 8px var(--cursor-color,#ff0000);
    transform:translate(-50%,-50%);transition:transform .1s ease;}
  .cursor-ring{position:fixed;top:0;left:0;z-index:10000;pointer-events:none;
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--cursor-color,#ff0000);
    background:radial-gradient(circle,var(--cursor-color,#ff0000) 0%,transparent 70%);
    background-blend-mode:screen;opacity:.9;
    mix-blend-mode:screen;
    transform:translate(-50%,-50%);
    transition:width .3s cubic-bezier(.25,.46,.45,.94),height .3s cubic-bezier(.25,.46,.45,.94),box-shadow .2s;
    box-shadow:0 0 16px var(--cursor-color,#ff0000),inset 0 0 12px var(--cursor-color,#ff0000);}
  .cursor-ring.hover{width:60px;height:60px;box-shadow:0 0 28px var(--cursor-color,#ff0000),inset 0 0 20px var(--cursor-color,#ff0000);}
  .cursor-ring.click{width:24px;height:24px;}
  button:hover,a:hover{opacity:1;}
  .entry-btn::before{content:'';position:absolute;inset:-2px;border-radius:12px;background:linear-gradient(90deg,#ff0000,#ff8000,#ffff00,#00ff00,#00ffff,#8000ff,#ff0080,#ff0000);background-size:300% 100%;animation:rgbText 4s linear infinite;z-index:-1;padding:2px;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
</style>
</head>
<body>
<div class="site-bg" aria-hidden="true"></div>
<div class="site-stars" aria-hidden="true"></div>
<div class="site-grain" aria-hidden="true"></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="EntrySplash.jsx"></script>
<script type="text/babel" src="RgbCursor.jsx"></script>
<script type="text/babel" src="MusicPlayer.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Marketplace.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="Trial.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Download.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="ContactCTA.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  const App = () => {
    const [entered, setEntered] = React.useState(() => {
      try { return localStorage.getItem('shlemut-entered') === '1'; } catch (e) { return false; }
    });
    const enter = () => {
      setEntered(true);
      try { localStorage.setItem('shlemut-entered', '1'); } catch (e) {}
    };
    return (
      <>
        {!entered && <EntrySplash onEnter={enter} />}
        <RgbCursor />
        <MusicPlayer entered={entered} />
        <Nav />
        <Hero />
        <Stats />
        <Features />
        <Marketplace />
        <HowItWorks />
        <Gallery />
        <Testimonials />
        <Trial />
        <Pricing />
        <Download />
        <FAQ />
        <Contact />
        <FinalCTA />
        <Footer />
      </>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
